<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Hogar - Productos de Google Sheets</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --light: #f8f9fa;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: var(--light); }
        header { background-color: var(--primary); color: white; padding: 20px; text-align: center; }
        nav { background-color: #34495e; display: flex; justify-content: center; padding: 10px; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }
        
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
        
        .search-container { grid-column: 1 / -1; margin-bottom: 20px; }
        .search-box { width: 100%; padding: 12px; font-size: 1rem; border: 2px solid #ccc; border-radius: 25px; box-sizing: border-box; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
        .product-card img { max-width: 100%; height: 150px; object-fit: cover; border-radius: 4px; }
        .product-card h3 { font-size: 1.1rem; margin: 10px 0; }
        .price { color: var(--accent); font-weight: bold; font-size: 1.2rem; }
        .btn-add { background-color: var(--primary); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; margin-top: 10px; }

        .cart-sidebar { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); height: fit-content; }
        .cart-items { list-style: none; padding: 0; max-height: 200px; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .payment-methods { margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px; }
        .btn-pay { display: block; width: 100%; padding: 10px; margin: 8px 0; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; text-align: center; text-decoration: none; }
        .enzona { background-color: #007bff; }
        .transfermovil { background-color: #d32f2f; }
        .loading { font-size: 1.2rem; text-align: center; grid-column: 1 / -1; padding: 40px; color: #666; }
    </style>
</head>
<body>

    <header>
        <h1>Productos - Tienda Hogar</h1>
    </header>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="productos.html">Productos</a>
    </nav>

    <div class="container">
        <div class="search-container">
            <input type="text" id="searchBox" class="search-box" placeholder="🔍 Buscar productos..." onkeyup="filterProducts()">
        </div>

        <main class="products-grid" id="catalog">
            <div class="loading" id="loadingMessage">Cargando productos desde Google Sheets...</div>
        </main>

        <aside class="cart-sidebar">
            <h2>🛒 Tu Carrito</h2>
            <ul id="cartItems" class="cart-items">
                <p id="emptyMessage" style="color: #777;">El carrito está vacío</p>
            </ul>
            <h3>Total: $<span id="cartTotal">0</span> CUP</h3>

            <div class="payment-methods">
                <h4>Método de Pago:</h4>
                <button class="btn-pay enzona" onclick="processPayment('EnZona')">Pagar con EnZona</button>
                <button class="btn-pay transfermovil" onclick="processPayment('Transfermóvil')">Pagar con Transfermóvil</button>
                <button class="btn-pay efectivo" style="background-color: #2e7d32;" onclick="processPayment('Efectivo')">Pagar en Efectivo</button>

            </div>
        </aside>
    </div>

    <script>
        // Línea 74 reparada con el ID correcto de tu nueva hoja Tienda Hogar
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1mj4-AHqzVkRfvV5LHlnJzexFbsdNI8KmrBawkzwvnKI/gviz/tq?tqx=out:csv';

        let cart = [];
        let total = 0;

        // Cargar datos automáticamente al abrir la página
        window.addEventListener('DOMContentLoaded', () => {
            fetch(SHEET_CSV_URL)
                .then(response => response.text())
                .then(data => renderProductsFromCSV(data))
                .catch(error => {
                    document.getElementById('loadingMessage').innerText = "Error al cargar los productos. Verifica la conexión o los permisos de tu Hoja de Cálculo.";
                    console.error(error);
                });
        });

        // Convertir el texto de la Hoja de Cálculo en elementos HTML
        function renderProductsFromCSV(csvText) {
            const lines = csvText.split('\n');
            const catalog = document.getElementById('catalog');
            document.getElementById('loadingMessage').style.display = 'none';

            // Empezamos en i = 1 para saltarnos los encabezados (nombre, precio, imagen)
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                // Dividir filas por comas, limpiando las comillas que añade Google
                const columns = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                const name = columns[0] ? columns[0].replace(/"/g, '').trim() : "Producto sin nombre";
                const price = columns[1] ? parseInt(columns[1].replace(/"/g, '').trim()) : 0;
                const image = columns[2] ? columns[2].replace(/"/g, '').trim() : "https://via.placeholder.com/150";

                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                productCard.setAttribute('data-name', name.toLowerCase());
                productCard.innerHTML = `
                    <img src="${image}" alt="${name}">
                    <h3>${name}</h3>
                    <p class="price">$${price} CUP</p>
                    <button class="btn-add" onclick="addToCart('${name}', ${price})">Agregar al Carrito</button>
                `;
                catalog.appendChild(productCard);
            }
        }

        // Funciones del Carrito
        function addToCart(name, price) {
            cart.push({name, price});
            total += price;
            updateCartUI();
        }

        function updateCartUI() {
            const cartItemsElement = document.getElementById('cartItems');
            const totalElement = document.getElementById('cartTotal');
            cartItemsElement.innerHTML = '';
            
            if(cart.length === 0) {
                cartItemsElement.innerHTML = '<p id="emptyMessage" style="color: #777;">El carrito está vacío</p>';
            } else {
                cart.forEach((item) => {
                    const li = document.createElement('li');
                    li.className = 'cart-item';
                    li.innerHTML = `<span>${item.name}</span> <b>$${item.price} CUP</b>`;
                    cartItemsElement.appendChild(li);
                });
            }
            totalElement.innerText = total;
        }

        // Buscador
        function filterProducts() {
            const query = document.getElementById('searchBox').value.toLowerCase();
            const products = document.querySelectorAll('.product-card');
            products.forEach(product => {
                const name = product.getAttribute('data-name');
                product.style.display = name.includes(query) ? "flex" : "none";
            });
        }

        // Procesar pedido y enviar a WhatsApp
        function processPayment(method) {
            if(cart.length === 0) {
                alert("El carrito está vacío.");
                return;
            }
            let message = `¡Hola Tienda Hogar! %0AQuiero confirmar el siguiente pedido:%0A`;
            cart.forEach(item => { message += `- ${item.name} ($${item.price} CUP)%0A`; });
            message += `%0ATotal: $${total} CUP%0APago: ${method}%0ASolicito servicio de mensajería.`;

            if(method === 'EnZona') {
                alert(`Listo para pagar con EnZona ($${total} CUP).\nPresiona aceptar para enviar los detalles a WhatsApp.`);
            } else {
                alert(`Instrucción Transfermóvil:\nRealice la transferencia de $${total} CUP a la cuenta de la tienda y presione aceptar para enviar el pedido por WhatsApp.`);
            }
            window.open(`https://wa.me/5350168277?text=${message}`, '_blank');
        }
    </script>
</body>
</html>
